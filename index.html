<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UON Chatbot Test</title>
    <style>
        body { background: #f0f2f5; font-family: Arial, sans-serif; }
        #uon-chat-wrapper { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        #chat-circle { width: 60px; height: 60px; background: #004B23; border-radius: 50%; text-align: center; color: white; line-height: 60px; font-size: 24px; cursor: pointer; box-shadow: 0px 4px 15px rgba(0,0,0,0.2); }
        #chat-box { width: 350px; height: 450px; background: #fff; border-radius: 10px; box-shadow: 0px 5px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; position: absolute; bottom: 80px; right: 0; }
        #chat-header { background: #004B23; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-header h4 { margin: 0; font-size: 16px; }
        #close-chat { cursor: pointer; }
        #chat-logs { flex: 1; padding: 15px; overflow-y: auto; background: #f7f9fb; display: flex; flex-direction: column; }
        .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; max-width: 80%; word-wrap: break-word; }
        .msg.bot { background: #e9ecef; color: #333; align-self: flex-start; }
        .msg.user { background: #004B23; color: white; align-self: flex-end; }
        #chat-input-area { display: flex; border-top: 1px solid #eee; padding: 10px; background: #fff; }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 8px; outline: none; }
        #chat-submit { background: #004B23; color: white; border: none; padding: 8px 15px; margin-left: 5px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="uon-chat-wrapper">
    <div id="chat-circle" onclick="toggleChat()">💬</div>

    <div id="chat-box" style="display: none;">
        <div id="chat-header">
            <h4>UON Admission Bot (Local Dev)</h4>
            <span id="close-chat" onclick="toggleChat()">✖</span>
        </div>
        <div id="chat-logs">
            <div class="msg bot">Hello! Testing UON Admission bot locally. Ask away!</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)"/>
            <button id="chat-submit" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const chatBox = document.getElementById('chat-box');
    chatBox.style.display = (chatBox.style.display === 'none') ? 'flex' : 'none';
}

function handleKeyPress(e) {
    if (e.key === 'Enter') sendMessage();
}

async function sendMessage() {
    const inputEl = document.getElementById('chat-input');
    const logsEl = document.getElementById('chat-logs');
    const userText = inputEl.value.trim();
    
    if (!userText) return;

    logsEl.innerHTML += `<div class="msg user">${userText}</div>`;
    inputEl.value = '';
    logsEl.scrollTop = logsEl.scrollHeight;

    const loadingId = 'loading-' + Date.now();
    logsEl.innerHTML += `<div class="msg bot" id="${loadingId}">Thinking...</div>`;
    logsEl.scrollTop = logsEl.scrollHeight;

    try {
        const response = await fetch('http://localhost:5000/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userText })
        });
        
        const data = await response.json();
        
        // Ensure this targets data.reply to align with our Flask endpoint mapping
        document.getElementById(loadingId).innerText = data.reply;
    } catch (error) {
        document.getElementById(loadingId).innerText = "Local backend server connection failed.";
        console.error(error);
    }
    logsEl.scrollTop = logsEl.scrollHeight;
}
</script>
</body>
</html>
